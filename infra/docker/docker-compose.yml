services:
  # ── SQL Server（Apple Silicon 原生 ARM64 用 Azure SQL Edge）──
  # 為什麼用 azure-sql-edge 而非官方 mssql/server：
  # - 官方 mcr.microsoft.com/mssql/server 只發 amd64 image，在 M1/M2 走 Rosetta 模擬，
  #   常因預設 SQL Server 記憶體配置 + 模擬器開銷直接 OOM 退出。
  # - azure-sql-edge 是 Microsoft 官方為 ARM64 出的精簡版，原生跑在 M1，記憶體佔用低、
  #   T-SQL 約 95% 相容，作為 dev / demo 後端足夠。
  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    restart: unless-stopped
    environment:
      # SA 密碼必須符合複雜度（≥8 chars、含大小寫/數字/符號），預設沿用 .env.example
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-Your_password123!}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - aoiops_mssql_data:/var/opt/mssql
    healthcheck:
      # 為什麼用 bash + /dev/tcp 而非 sqlcmd：
      # - 新版 azure-sql-edge (latest) 為了精簡，已不再內建 sqlcmd；
      # - 用 bash /dev/tcp 做 TCP readiness，等待 1433 可連線即可。
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka:
    # 官方 Apache Kafka image，避免第三方 tag 不存在
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      # KRaft 模式（單機開發）。新手最容易被 Zookeeper/Kafka 兩套設定搞混。
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # 單 broker 開發環境必備（__consumer_offsets 預設 RF=3 會建立失敗）
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "9092:9092"
    volumes:
      - aoiops_kafka_data:/var/lib/kafka
    # 新增 healthcheck：透過 KRaft API（kafka-broker-api-versions.sh）確認 broker 已就緒。
    # 為什麼用這條：純 TCP 接得上不代表 broker 完成 KRaft 選舉；用此 cli 才能確保「能 produce/consume」。
    healthcheck:
      test:
        - CMD-SHELL
        - "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 >/dev/null 2>&1"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理介面
    volumes:
      - aoiops_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      # InfluxDB 2.x 初始化（開發用最小設定）
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminadminadmin
      - DOCKER_INFLUXDB_INIT_ORG=aoiops
      - DOCKER_INFLUXDB_INIT_BUCKET=aoiops
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=aoiops-dev-token
    ports:
      - "8086:8086"
    volumes:
      - aoiops_influxdb_data:/var/lib/influxdb2
    healthcheck:
      # 為什麼不用 wget/curl：官方 influxdb image 預設不含 wget，某些 tag 也不含 curl，
      # 但一定會有 `influx` CLI；用它做 ping 才不會健康檢查永遠失敗而卡在 unhealthy。
      test: ["CMD-SHELL", "influx ping --host http://localhost:8086 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 15s

  # ── mssql 一次性 init sidecar ──
  # 為什麼獨立 sidecar：azure-sql-edge 沒有內建「啟動時自動執行 init SQL 資料夾」的機制，
  # 用一次性容器在 mssql healthy 之後執行建表 SQL，跑完即退出（restart: "no"），不佔資源。
  #
  # 為什麼用 mcr.microsoft.com/mssql-tools 而非 azure-sql-edge：
  # - azure-sql-edge:latest 已移除 sqlcmd，無法在 sidecar 內直接呼叫；
  # - mssql-tools 是 Microsoft 官方專為 client tools 出的 ~150 MB image，內建 sqlcmd；
  # - 此 image 僅有 amd64 變體，但 sidecar 是 one-shot（跑 <2 秒即 exit），
  #   M1 Rosetta 模擬影響極小，可接受。
  mssql-init:
    image: mcr.microsoft.com/mssql-tools:latest
    platform: linux/amd64
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-Your_password123!}
    volumes:
      - ../db/mssql-init:/init:ro
    restart: "no"
    entrypoint: ["bash", "-lc"]
    command: >
      "/opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P \"$$MSSQL_SA_PASSWORD\" -i /init/01_create_db.sql -b"

  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    environment:
      # 為了讓 container 對外提供 HTTP，避免 https redirection 在 dev 被卡住
      - ASPNETCORE_ENVIRONMENT=Development
      # DB provider 切換：
      # - 目前專案以 SQL Server 為主資料庫
      # - 若要覆蓋（例如測試不同環境），可設定 Database__Provider/ConnectionStrings__Default
      # 目前專案以 SQL Server 為主資料庫，因此預設 provider=sqlserver、連線指向 mssql service。
      - Database__Provider=${DB_PROVIDER:-sqlserver}
      - ConnectionStrings__Default=${DB_CONNECTION:-Server=mssql,1433;Database=AOIOpsPlatform_MSSQL;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_password123!};TrustServerCertificate=True;}
      # 為什麼在 docker 內不能用 localhost：
      # - container 的 localhost 指向自己，不是 kafka/rabbitmq 容器；
      # - appsettings.Development.json 會把 bootstrap/hostname 覆蓋成 localhost（給本機開發用），
      #   所以在 compose 環境必須用 env 強制覆蓋成服務名稱。
      - Messaging__Kafka__BootstrapServers=kafka:9092
      - Messaging__RabbitMq__HostName=rabbitmq
      # W05：Domain Profile 切換（pcb / semiconductor）
      # ASP.NET Core 用 __ 對應 :，所以 Domain__Profile 等同 appsettings 裡的 Domain:Profile
      - Domain__Profile=${DOMAIN_PROFILE:-pcb}
      - Domain__ProfilesDirectory=/app/shared/domain-profiles
    ports:
      - "8080:8080"
    depends_on:
      mssql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health/db || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    # 為什麼不再用 volume + dotnet run：
    # - 先前在 sdk 容器內會出現 Kestrel 不 listen 的假死狀態；改用 publish 後的 runtime 執行較穩定，也更接近實際部署。

  frontend:
    image: node:20-bullseye
    working_dir: /src/frontend
    volumes:
      - ../../:/src
    environment:
      # Vite 在 container 內需綁 0.0.0.0 才能被 host 存取
      - VITE_API_BASE_URL=http://localhost:8080
      # SPC Service（Python FastAPI，port 8001）
      - VITE_SPC_API_URL=http://localhost:8001
      # W05：Domain Profile（前端 fallback / 偵錯用；正常流程會 fetch /api/meta/profile）
      - VITE_DOMAIN_PROFILE=${DOMAIN_PROFILE:-pcb}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    command: >
      bash -lc "npm ci &&
      npm run dev -- --host 0.0.0.0 --port 5173"

  ingestion:
    # 單一容器：設備事件 Producer + Kafka→DB 落地 Writer
    image: python:3.12-slim
    working_dir: /src/services/ingestion
    volumes:
      - ../../:/src
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_INSPECTION=aoi.inspection.raw
      - KAFKA_TOPIC_DEFECT=aoi.defect.event
      - KAFKA_CONSUMER_GROUP=aoiops-ingestion-writer
      # DB provider 切換（與 backend 同規格）：目前專案預設 sqlserver
      - DB_PROVIDER=${DB_PROVIDER:-sqlserver}
      - DB_CONNECTION=${DB_CONNECTION:-Server=mssql,1433;Database=AOIOpsPlatform_MSSQL;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_password123!};TrustServerCertificate=True;}
      # W11 假資料情境：normal|drift|spike|misjudge
      - SIM_SCENARIO=${SIM_SCENARIO:-normal}
    depends_on:
      mssql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      # 為什麼依賴 backend：SQL Server 模式下 schema 由 backend EnsureCreated 建立；先讓 backend 起來避免 ingestion 寫入時表不存在。
      backend:
        condition: service_started
    command: >
      bash -lc "pip install -r requirements.txt &&
      python -m app"

  spc-service:
    # 批次 / 歷史 SPC 報表（FastAPI，port 8001）
    # 即時 SPC 已搬到 .NET SpcRealtimeWorker；這個服務只做 Cpk 報表 / Pareto 等。
    image: python:3.12-slim
    working_dir: /src/services/spc-service
    volumes:
      - ../../:/src
    environment:
      - PYTHONUNBUFFERED=1
      # DB provider 切換（與 backend 同規格）
      - DB_PROVIDER=${DB_PROVIDER:-sqlserver}
      - DB_CONNECTION=${DB_CONNECTION:-Server=mssql,1433;Database=AOIOpsPlatform_MSSQL;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_password123!};TrustServerCertificate=True;}
    depends_on:
      mssql:
        condition: service_healthy
      backend:
        condition: service_started
    ports:
      - "8001:8001"
    command: >
      bash -lc "pip install -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"

  kafka-influx-writer:
    # Kafka aoi.inspection.raw → InfluxDB（時序）
    image: python:3.12-slim
    working_dir: /src/services/kafka-consumers/influx-writer
    volumes:
      - ../../:/src
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_INSPECTION=aoi.inspection.raw
      - KAFKA_CONSUMER_GROUP=aoiops-influx-writer
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_ORG=aoiops
      - INFLUX_BUCKET=aoiops
      - INFLUX_TOKEN=aoiops-dev-token
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    command: >
      bash -lc "pip install -r requirements.txt &&
      python -m app"

  kafka-rabbitmq-publisher:
    # Kafka → RabbitMQ（業務路由）
    image: python:3.12-slim
    working_dir: /src/services/kafka-consumers/rabbitmq-publisher
    volumes:
      - ../../:/src
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_DEFECT=aoi.defect.event
      - KAFKA_CONSUMER_GROUP=aoiops-rabbitmq-publisher
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_QUEUE_ALERT=alert
      - RABBITMQ_QUEUE_WORKORDER=workorder
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      bash -lc "pip install -r requirements.txt &&
      python -m app"

  # legacy：Python rabbitmq → DB sink。
  # W07 起 .NET RabbitMqConsumerHostedService（AlarmRabbitWorker / WorkorderRabbitWorker）已接手；
  # 兩邊同時消費同一個 queue 會互搶訊息，所以這個服務改成 profile=legacy（預設不啟動）。
  # 仍要跑舊路線時：docker compose --profile legacy up rabbitmq-db-sink
  rabbitmq-db-sink:
    profiles: ["legacy"]
    image: python:3.12-slim
    working_dir: /src/services/rabbitmq-consumers/db-sink
    volumes:
      - ../../:/src
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_QUEUE_ALERT=alert
      - RABBITMQ_QUEUE_WORKORDER=workorder
      # legacy service：若未來要啟用，需另行確認 SQL Server schema/查詢相容性
      - DB_CONNECTION=Server=mssql,1433;Database=AOIOpsPlatform_MSSQL;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_password123!};TrustServerCertificate=True;
    depends_on:
      mssql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      bash -lc "pip install -r requirements.txt &&
      python -m app"

volumes:
  aoiops_kafka_data:
  aoiops_rabbitmq_data:
  aoiops_influxdb_data:
  # SQL Server 資料 volume
  aoiops_mssql_data:
