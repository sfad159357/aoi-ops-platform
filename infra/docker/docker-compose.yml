services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # 為了讓開發環境一鍵啟動，這裡用單一帳密（MVP 開發用途）。
      # 實務上應改用更安全的帳密與 secret 管理。
      - POSTGRES_DB=AOIOpsPlatform
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - aoiops_postgres_data:/var/lib/postgresql/data
      # 之所以掛載 init script：讓 DB container 第一次啟動時就能自動建立必要 extension / seed（MVP 用途）
      # 注意：只有在資料卷是「全新」時才會執行（Postgres 官方 entrypoint 行為）
      - ../db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 10s
      retries: 20

  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src/backend/src/Api
    volumes:
      - ../../:/src
    environment:
      # 為了讓 container 對外提供 HTTP，避免 https redirection 在 dev 被卡住
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__Default=Host=db;Port=5432;Database=AOIOpsPlatform;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres};
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc "dotnet restore &&
      dotnet watch run --no-hot-reload --no-launch-profile"
      # --no-launch-profile 讓 dotnet 忽略 launchSettings.json（裡面寫死 localhost:5124）
      # 改從環境變數 ASPNETCORE_URLS=http://0.0.0.0:8080 決定綁定位址
      # 不加這個 flag，compose 的 ASPNETCORE_URLS 會被 launchSettings 的 applicationUrl 整個蓋掉

  frontend:
    image: node:20-bullseye
    working_dir: /src/frontend
    volumes:
      - ../../:/src
    environment:
      # Vite 在 container 內需綁 0.0.0.0 才能被 host 存取
      - VITE_API_BASE_URL=http://localhost:8080
      # SPC Service（Python FastAPI，port 8001）
      - VITE_SPC_API_URL=http://localhost:8001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: >
      bash -lc "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"

  ingestion:
    # 單一容器：設備事件 Producer + Kafka→DB 落地 Writer
    image: python:3.12-slim
    working_dir: /src/services/ingestion
    volumes:
      - ../../:/src
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_INSPECTION=aoi.inspection.raw
      - KAFKA_CONSUMER_GROUP=aoiops-ingestion-writer
      - DB_CONNECTION=Host=db;Port=5432;Database=AOIOpsPlatform;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres};
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    command: >
      bash -lc "pip install -r requirements.txt &&
      python -m app"

  spc-service:
    # SPC Service（統計製程管制計算服務）
    # 為什麼獨立成 Python 微服務：
    # - NumPy 的矩陣運算比在 C# 裡手刻更簡潔；計算密集邏輯適合 Python。
    # - Port 8001 避免與 C# 後端（8080）衝突。
    image: python:3.12-slim
    working_dir: /src/services/spc-service
    volumes:
      - ../../:/src
    environment:
      - PYTHONUNBUFFERED=1
      # 讓 SPC Service 能直接從 PostgreSQL 取真實製程資料（Live 模式）
      - DB_CONNECTION=Host=db;Port=5432;Database=AOIOpsPlatform;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres};
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8001"
    command: >
      bash -lc "pip install -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"

  kafka:
    # 使用官方 Apache Kafka image，避免第三方 tag 不存在造成新手卡住 pull 失敗
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      # 為什麼用 KRaft（不需要 Zookeeper）：
      # - 新手最容易被 Zookeeper/Kafka 兩套設定搞混；KRaft 讓單機開發更單純。
      # - MVP 先求「能跑、能發/收訊息」，之後再談多節點與 HA。
      # 官方 image 的 env key 命名與 bitnami 不同（不帶 KAFKA_CFG_ 前綴）
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      # 使用 service name `kafka` 當作容器內部 DNS 名稱，避免移除 container_name 後 hostname 找不到
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # 只提供 Docker network 內部連線：
      # - 避免 advertised=localhost 讓 container 內 client（consumer group 協調）回連到自己，造成「poll 永遠拿不到資料」
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # 單 broker 開發環境必備：
      # - consumer group 需要 __consumer_offsets topic；預設 RF=3 會導致建立失敗，進而造成「永遠無法分配 partition」
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      # 讓 group rebalance 更快（開發體驗用）
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "9092:9092"
    volumes:
      - aoiops_kafka_data:/var/lib/kafka

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      # 為什麼先用預設帳密（開發用）：
      # - 新手先把架構跑通；上線再改成 secret / vault。
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理介面
    volumes:
      - aoiops_rabbitmq_data:/var/lib/rabbitmq

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      # InfluxDB 2.x 初始化（開發用最小設定）
      # 為什麼要 init：
      # - 不 init 的話第一次進 UI 需要手動點一堆；新手容易卡住。
      - 先固定 org/bucket，後面寫入 worker 才有明確目標。
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminadminadmin
      - DOCKER_INFLUXDB_INIT_ORG=aoiops
      - DOCKER_INFLUXDB_INIT_BUCKET=aoiops
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=aoiops-dev-token
    ports:
      - "8086:8086"
    volumes:
      - aoiops_influxdb_data:/var/lib/influxdb2

volumes:
  aoiops_postgres_data:
  aoiops_kafka_data:
  aoiops_rabbitmq_data:
  aoiops_influxdb_data:

